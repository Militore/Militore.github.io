<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="icon" type="image/png" sizes="196x196" href="/img/favicon.png">
	<title>Militore Tools</title>
	<link rel="stylesheet" type="text/css" href="/css/style.css">
    <link rel="stylesheet" type="text/css" href="/css/js.css">
</head>
<body>
<header>
    <h1>Personal site</h1>
    <nav>
        <div id="nav-navbar" class="middle">
            <a href="/">EN</a>
            <a href="/ru/">RU</a>
        </div>
    </nav>
    <a id="nav-hide">^</a>
</header>
<main>
<div id="horizontal-select" class="middle">
    <ul>
        <li><button id="password">Password</button></li>
        <li><button id="encryptor">AES Encryptor</button></li>
    </ul>
</div>
<template id="password">
    <div id="password">
        <h2>Password Generator</h2>
        <div class="flex two-row">
            <div id="password-form">
                <label for="password-text">Password</label>
                <input id="password-text" type="text" readonly>
                <label for="password-length-text">Password Length</label>
                <label for="password-length">16</label>
                <input id="password-length" type="range" min="1" max="40" value="16">
                <button id="password-start" type="submit" class="middle">Generate password</button>
                <button id="password-copy">Copy</button>
            </div>
            <div id="warning">
                <span style="color:red">
                    <p><b>Attention:</b> This method of password generation may be unsafe for the following reasons:</p>
                    <ul>
                        <li>The display is in clear text without hashing.</li>
                        <li>Disappears after updating the page or generating a new password - <b>SAVE IT IN A SAFE PLACE!</b></li>
                        <li>A password consisting of less than 8 characters is easy to find.</li>
                    </ul>
                </span>
                <span style="color:green">
                    <p>Why can this method of password generation be considered secure:</p>
                    <ul>
                        <li>The generation is on your side (the client) - it is not saved on the server or in the database.</li>
                        <li>It is very difficult to bruteforce more than 12 characters.</li>
                    </ul>
                </span>
            </div>
        </div>
    </div>
</template>
<template id="encryptor">
    <div id="encryptor">
        <h2>AES Encryptor</h2>
        <div class="flex two-row">
            <div class="encryptor-tab-content border-right" data-tab="encrypt">
                <h3 style="color:red">Encrypt</h3>
                <div class="encryptor-info-box">
                    <strong>How to use:</strong> Enter your message and password. Send an encrypted message. The receiver must know the password. Then click decrypt.
                </div>
                
                <div class="encryptor-form-group">
                    <textarea class="encryptor-plaintext" placeholder="Message to encrypt..."></textarea>
                </div>
                
                <div class="encryptor-form-group">
                    <input type="password" class="encryptor-encrypt-password" placeholder="Password...">
                </div>
                
                <div class="encryptor-button-group">
                    <button class="encryptor-btn-primary encryptor-encrypt-btn">Encrypt</button>
                </div>
                
                <div class="encryptor-output-box">
                    <div class="encryptor-output-label">Encrypted message:</div>
                    <div class="encryptor-output-text encryptor-encrypted-text"></div>
                    <button class="encryptor-copy-btn encryptor-copy-encrypted-btn">Copy</button>
                </div>
            </div>
            
            <div class="encryptor-tab-content" data-tab="decrypt">
                <h3 style="color:green">Decrypt</h3>
                <div class="encryptor-info-box">
                    <strong>How to use:</strong> Enter the message and password, click decrypt.
                </div>
                
                <div class="encryptor-form-group">
                    <textarea class="encryptor-ciphertext" placeholder="Encrypted message..."></textarea>
                </div>
                
                <div class="encryptor-form-group">
                    <input type="password" class="encryptor-decrypt-password" placeholder="Password...">
                </div>
                
                <div class="encryptor-button-group">
                    <button class="encryptor-btn-primary encryptor-decrypt-btn">Decrypt</button>
                </div>
                
                <div class="encryptor-output-box">
                    <div class="encryptor-output-label">Decrypted message:</div>
                    <div class="encryptor-output-text encryptor-decrypted-text"></div>
                    <button class="encryptor-copy-btn encryptor-copy-decrypted-btn">Copy</button>
                </div>
            </div>
        </div>
        <p>This tool uses https://cdnjs.com/libraries/crypto-js</p>
    </div>
</template>
<noscript class="middle">
    <b>Javascript is enabled. Functions will not work.</b>
    <a href="https://yandex.ru/support/common/ru/browsers-settings/browsers-java-js-settings">Instruction on how to enable javascript</a>
</noscript>
</main>
<footer>
    <div id="left-footer">
    <p>Solving your problems, contact for details.</p>
    <div id="contact">
        <noscript><p>Javascript disabled, contacts hidden for security reasons.</p></noscript>
        <js-exe class="cont-tg"><script src="/js/nojs-hide.js"></script></js-exe>
    </div>
    </div>
    <div id="right-footer">
        <p>Theme changer</p>
        <input type="range" id="change-theme" min="1" max="3" value="1">
    </div>
</footer>
<script src="/js/jquery-3.7.1.min.js"></script>
<script src="/js/general.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
<script src="/js/tools.js"></script>
</div>
</body>
</html>
